name: CD

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    env:
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH != '' && secrets.DEPLOY_PATH || '/var/www/flatease' }}
    steps:
      - name: Validate required deployment secrets
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          missing=()
          [ -z "$DEPLOY_HOST" ] && missing+=("DEPLOY_HOST")
          [ -z "$DEPLOY_USER" ] && missing+=("DEPLOY_USER")
          [ -z "$DEPLOY_SSH_KEY" ] && missing+=("DEPLOY_SSH_KEY")

          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing GitHub Actions secret(s): ${missing[*]}"
            exit 1
          fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -e
            if [ ! -d "${{ env.DEPLOY_PATH }}/.git" ]; then
              mkdir -p "${{ env.DEPLOY_PATH }}"
              git clone https://github.com/${{ github.repository }}.git "${{ env.DEPLOY_PATH }}"
            fi

            cd "${{ env.DEPLOY_PATH }}"
            git checkout main
            git pull --ff-only origin main

            docker compose up -d --build
            docker compose exec -T backend bash /var/www/database/migrations/run_sql_migrations.sh
            docker compose exec -T backend php artisan optimize:clear
