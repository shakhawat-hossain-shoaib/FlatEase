name: CD

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    env:
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH != '' && secrets.DEPLOY_PATH || '/var/www/flatease' }}
    steps:
      - name: Validate required deployment secrets
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          missing=()
          [ -z "$DEPLOY_HOST" ] && missing+=("DEPLOY_HOST")
          [ -z "$DEPLOY_USER" ] && missing+=("DEPLOY_USER")
          [ -z "$DEPLOY_SSH_KEY" ] && missing+=("DEPLOY_SSH_KEY")

          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing GitHub Actions secret(s): ${missing[*]}"
            exit 1
          fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -e
            DEPLOY_PATH="${{ env.DEPLOY_PATH }}"
            REPO_URL="https://github.com/${{ github.repository }}.git"

            mkdir -p "$DEPLOY_PATH"

            # If path exists but is not a git repo, initialize it in-place.
            if [ ! -d "$DEPLOY_PATH/.git" ]; then
              cd "$DEPLOY_PATH"
              git init
              git remote add origin "$REPO_URL"
            fi

            cd "$DEPLOY_PATH"
            git remote set-url origin "$REPO_URL"
            git fetch origin main
            git checkout -B main origin/main
            git reset --hard origin/main

            # Always tear down previous stack first to avoid name/network conflicts.
            docker compose down --remove-orphans || true
            docker network rm flatease_flatease-network 2>/dev/null || true

            docker compose up -d --build --remove-orphans --force-recreate

            # Ensure database and app user privileges exist before running SQL migrations.
            docker compose exec -T mysql sh -lc '
              DB_NAME="${MYSQL_DATABASE:-${DB_DATABASE:-flatease_db}}"
              APP_USER="${MYSQL_USER:-${DB_USERNAME:-flatease}}"
              APP_PASS="${MYSQL_PASSWORD:-${DB_PASSWORD:-Root@1234}}"
              ROOT_PASS="${MYSQL_ROOT_PASSWORD:-Root@1234}"

              mysql -uroot -p"$ROOT_PASS" <<SQL
CREATE DATABASE IF NOT EXISTS \`$DB_NAME\` CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
CREATE USER IF NOT EXISTS '\''$APP_USER'\''@'\''%'\'' IDENTIFIED BY '\''$APP_PASS'\'';
ALTER USER '\''$APP_USER'\''@'\''%'\'' IDENTIFIED BY '\''$APP_PASS'\'';
GRANT ALL PRIVILEGES ON \`$DB_NAME\`.* TO '\''$APP_USER'\''@'\''%'\'';
FLUSH PRIVILEGES;
SQL
            '

            docker compose exec -T backend bash /var/www/database/migrations/run_sql_migrations.sh
            docker compose exec -T backend php artisan optimize:clear
