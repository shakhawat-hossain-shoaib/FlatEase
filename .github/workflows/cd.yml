name: CD

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    env:
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH != '' && secrets.DEPLOY_PATH || '/var/www/flatease' }}
    steps:
      - name: Validate required deployment secrets
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          missing=()
          [ -z "$DEPLOY_HOST" ] && missing+=("DEPLOY_HOST")
          [ -z "$DEPLOY_USER" ] && missing+=("DEPLOY_USER")
          [ -z "$DEPLOY_SSH_KEY" ] && missing+=("DEPLOY_SSH_KEY")

          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing GitHub Actions secret(s): ${missing[*]}"
            exit 1
          fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -e
            DEPLOY_PATH="${{ env.DEPLOY_PATH }}"
            REPO_URL="https://github.com/${{ github.repository }}.git"

            mkdir -p "$DEPLOY_PATH"

            # If path exists but is not a git repo, initialize it in-place.
            if [ ! -d "$DEPLOY_PATH/.git" ]; then
              cd "$DEPLOY_PATH"
              git init
              git remote add origin "$REPO_URL"
            fi

            cd "$DEPLOY_PATH"
            git remote set-url origin "$REPO_URL"
            git fetch origin main
            git checkout -B main origin/main
            git reset --hard origin/main

            # Clean stale resources from earlier runs that can conflict with fixed container names.
            docker rm -f flatease-frontend flatease-backend flatease-mysql 2>/dev/null || true
            docker network rm flatease_flatease-network 2>/dev/null || true

            docker compose up -d --build --remove-orphans
            docker compose exec -T backend bash /var/www/database/migrations/run_sql_migrations.sh
            docker compose exec -T backend php artisan optimize:clear
