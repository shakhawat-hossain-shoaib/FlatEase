name: CD
run-name: Deploy to Server - ${{ github.ref_name }}

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    env:
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
    steps:
      - name: Validate required deployment secrets
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          missing=()
          [ -z "$DEPLOY_HOST" ] && missing+=("DEPLOY_HOST")
          [ -z "$DEPLOY_USER" ] && missing+=("DEPLOY_USER")
          [ -z "$DEPLOY_SSH_KEY" ] && missing+=("DEPLOY_SSH_KEY")

          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing GitHub Actions secret(s): ${missing[*]}"
            exit 1
          fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -e
            DEPLOY_PATH="${{ env.DEPLOY_PATH }}"
            DEPLOY_PATH="${DEPLOY_PATH:-/var/www/flatease}"
            REPO_URL="https://github.com/${{ github.repository }}.git"

            mkdir -p "$DEPLOY_PATH"

            if [ ! -d "$DEPLOY_PATH/.git" ]; then
              if [ -z "$(ls -A "$DEPLOY_PATH")" ]; then
                git clone "$REPO_URL" "$DEPLOY_PATH"
              else
                cd "$DEPLOY_PATH"
                git init
                git remote add origin "$REPO_URL"
              fi
            fi

            cd "$DEPLOY_PATH"
            REPO_URL="$REPO_URL" bash ./docker-deploy.sh
